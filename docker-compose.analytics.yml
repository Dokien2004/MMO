services:
  grafana:
    image: grafana/grafana-oss:latest
    container_name: mmo-grafana
    restart: unless-stopped
    network_mode: host
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin12345}
      GF_USERS_DEFAULT_THEME: light
      GF_INSTALL_PLUGINS: grafana-clock-panel
      MYSQL_HOST: ${MYSQL_HOST:-127.0.0.1}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mmo_affiliate}
      MYSQL_USER: ${MYSQL_USER:-mmo_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env.analytics}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./analytics/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  grafana-data:
