apiVersion: 1

datasources:
  - name: MMO MariaDB
    uid: mmo-mariadb
    type: mysql
    access: proxy
    url: ${MYSQL_HOST}:${MYSQL_PORT}
    database: ${MYSQL_DATABASE}
    user: ${MYSQL_USER}
    secureJsonData:
      password: ${MYSQL_PASSWORD}
    jsonData:
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      timeInterval: 1d
    editable: true
